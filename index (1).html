<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>🏀 籃球錦標賽</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#030712;color:#f8fafc;font-family:'Noto Sans TC',Inter,sans-serif;min-height:100vh}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pulse{animation:pulse 1.5s infinite}
.fade-in{animation:fadeIn .3s ease forwards}

.header{background:linear-gradient(135deg,#0f172a 0%,#1a0800 50%,#0f172a 100%);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:20}
.header-inner{max-width:1100px;margin:0 auto;padding:14px 16px 0}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:12px}
.event-sub{font-size:10px;color:#f97316;font-weight:800;letter-spacing:.3em;text-transform:uppercase;margin-bottom:4px}
.event-name{font-size:22px;font-weight:900;letter-spacing:-.02em;line-height:1.2}
.event-name span.o{color:#f97316}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.admin-btn{border-radius:20px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.admin-btn.off{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#94a3b8}
.admin-btn.on{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.5);color:#f97316}
.live-dot{display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#4ade80}
.live-label{font-size:10px;color:#4ade80;font-weight:700}
.lang-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#94a3b8;border-radius:16px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.lang-btn:hover{background:rgba(255,255,255,.1);color:#f8fafc}

.tabs{display:flex;border-top:1px solid rgba(255,255,255,.08);margin:0 -16px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:12px 18px;font-size:13px;font-weight:700;background:transparent;border:none;cursor:pointer;color:#475569;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:#f97316;border-bottom:2px solid #f97316}

.content{max-width:1100px;margin:0 auto;padding:16px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px}

/* Group tabs */
.group-tabs-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.gtab{flex:0 0 auto;padding:7px 18px;font-size:13px;font-weight:700;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;cursor:pointer;color:#94a3b8;transition:all .2s}
.gtab.active{background:rgba(249,115,22,.15);border-color:rgba(249,115,22,.5);color:#f97316}

/* Admin panel */
.admin-panel{background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.2);border-radius:16px;padding:16px;margin-bottom:16px}
.admin-panel-title{font-size:12px;font-weight:800;color:#f97316;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.admin-section{margin-bottom:14px}
.admin-section:last-child{margin-bottom:0}
.admin-section-label{font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.admin-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.admin-input{background:#1e293b;border:1px solid rgba(249,115,22,.4);border-radius:10px;padding:8px 12px;color:#f8fafc;font-size:13px;outline:none;transition:border-color .2s;min-width:140px}
.admin-input:focus{border-color:#f97316}
.admin-save-btn{background:#f97316;color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.admin-save-btn:hover{background:#ea6c0a}
.danger-btn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s}
.danger-btn:hover{background:rgba(239,68,68,.25);border-color:#ef4444}
.group-name-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

/* Round management */
.round-mgmt-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.round-chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:5px 12px;font-size:12px;display:flex;align-items:center;gap:6px;color:#cbd5e1}
.round-chip button{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#f87171;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
.swap-btn{background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.5);color:#a78bfa;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.swap-btn.active{background:rgba(167,139,250,.35);color:#fff}
.swap-hint-bar{font-size:12px;color:#fbbf24;text-align:center;padding:8px;background:rgba(251,191,36,.08);border-radius:10px;margin-bottom:12px}

.match-card.drag-over{border:2px dashed #f97316!important;background:rgba(249,115,22,.12)!important}
.match-card.dragging{opacity:.4;transform:scale(.97)}
.match-card[draggable="true"]{cursor:default}
.drag-handle-bar{height:12px;background:rgba(255,255,255,.06);border-radius:6px 6px 0 0;margin:-18px -14px 8px;cursor:grab;display:flex;align-items:center;justify-content:center;user-select:none}
.drag-handle-bar::after{content:'⋮⋮';color:#475569;font-size:11px;letter-spacing:2px}
.drag-handle-bar:hover{background:rgba(249,115,22,.15)}
.drag-handle{position:absolute;top:50%;left:-18px;transform:translateY(-50%);color:#475569;font-size:14px;cursor:grab;user-select:none;padding:4px;display:none}
.round-col:hover .drag-handle{display:block}

/* Bracket */
.bracket-scroll{overflow-x:auto;padding-bottom:16px}
.bracket-hint{font-size:12px;color:#475569;margin-bottom:12px}
.bracket-row{display:flex;gap:20px;min-width:max-content;align-items:flex-start}
.round-col{display:flex;flex-direction:column;align-items:center}
.round-label{font-size:11px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px}
.round-matches{display:flex;flex-direction:column}
.match-card{position:relative;padding:18px 14px 12px;min-width:185px;border-radius:14px;transition:border-color .3s;margin-bottom:8px}
.match-card.done{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.6)}
.match-card.live{background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.5)}
.match-card.pending{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.match-card.placeholder{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);min-height:72px}
.match-card.swap-selected{border:2px solid #a78bfa;background:rgba(167,139,250,.1)}
.match-card.swap-mode{cursor:pointer}
.match-status{position:absolute;top:8px;right:10px;display:flex;align-items:center;gap:3px;font-size:10px;font-weight:700}
.status-dot{width:6px;height:6px;border-radius:50%}
.team-row{display:flex;justify-content:space-between;align-items:center}
.score-row{display:flex;justify-content:space-between;align-items:center;margin:3px 0 2px;padding:2px 0}
.score-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.05em}
.team-row.swap-target{cursor:pointer;border-radius:6px;padding:2px 4px;margin:-2px -4px}
.team-row.swap-target:hover{background:rgba(167,139,250,.15)}
.team-name{font-size:13px}
.team-name.winner{color:#f97316;font-weight:700}
.team-name.placeholder-t{color:#334155}
.team-name[draggable="true"]{cursor:grab}
.team-name[draggable="true"]:active{cursor:grabbing}
.team-name.name-drag-over{background:rgba(249,115,22,.2);border-radius:4px;outline:1px dashed #f97316}
.team-score{font-family:monospace;font-size:20px;font-weight:700;margin-left:12px;color:#94a3b8}
.team-score.winner{color:#f97316}
.divider{border-top:1px solid rgba(255,255,255,.08);margin:5px 0}
.edit-btn{width:100%;background:transparent;border:1px solid rgba(249,115,22,.25);border-radius:8px;color:#f97316;font-size:12px;padding:5px 0;cursor:pointer;margin-top:8px;transition:background .2s}
.edit-btn:hover{background:rgba(249,115,22,.1)}
.score-inputs{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
.score-input{width:52px;background:#1e293b;border:1px solid #f97316;border-radius:8px;padding:3px 6px;color:#f8fafc;text-align:center;font-size:13px;outline:none}
.vs-label{color:#475569;font-size:12px}
.confirm-btn{background:#f97316;color:#fff;border:none;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;cursor:pointer}
.cancel-btn{background:transparent;color:#94a3b8;border:none;font-size:12px;cursor:pointer}
.champion-box{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 22px;background:rgba(251,191,36,.1);border:2px solid #fbbf24;border-radius:16px;margin-left:16px}
.champion-icon{font-size:26px}
.champion-label{font-size:11px;color:#fbbf24;font-weight:800;letter-spacing:.15em;text-align:center}
.champion-name{font-size:16px;color:#fbbf24;font-weight:900}
.bye-btn{width:100%;margin-top:8px;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.5);color:#4ade80;border-radius:8px;padding:6px 0;font-size:12px;font-weight:700;cursor:pointer}
.bye-btn:hover{background:rgba(74,222,128,.25)}
.add-match-btn{margin-top:4px;background:rgba(96,165,250,.1);border:1px dashed rgba(96,165,250,.5);color:#60a5fa;border-radius:10px;padding:8px 0;font-size:12px;font-weight:700;cursor:pointer;width:185px}
.add-match-btn:hover{background:rgba(96,165,250,.2)}
.del-match-btn{position:absolute;top:6px;left:6px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;z-index:2}
.del-match-btn:hover{background:rgba(239,68,68,.3)}


/* Announce */
.ann-input-row{display:flex;gap:8px;margin-bottom:12px}
.ann-input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(249,115,22,.4);border-radius:12px;padding:10px 14px;color:#f8fafc;font-size:14px;outline:none}
.ann-input:focus{border-color:#f97316}
.ann-post-btn{background:#f97316;color:#fff;border:none;border-radius:12px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer}
.ann-card{padding:14px 18px;border-radius:14px;margin-bottom:8px}
.ann-time{font-size:11px;color:#f97316;font-weight:700;margin-bottom:4px}
.ann-text{font-size:14px;line-height:1.6}
.ann-header-row{display:flex;justify-content:space-between;align-items:flex-start}
.del-btn{background:transparent;border:none;color:#475569;cursor:pointer;font-size:16px;padding:2px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{padding:28px;width:100%;max-width:340px;border-radius:20px;background:#0f172a;border:1px solid rgba(249,115,22,.3)}
.modal h2{font-size:18px;font-weight:800;margin-bottom:4px}
.modal p{font-size:13px;color:#94a3b8;margin-bottom:18px}
.modal-input{width:100%;background:#1e293b;border-radius:10px;padding:10px 14px;color:#f8fafc;font-size:14px;outline:none;margin-bottom:4px;transition:border-color .2s}
.modal-input.ok{border:1px solid rgba(255,255,255,.12)}
.modal-input.err{border:1px solid #ef4444}
.err-msg{color:#ef4444;font-size:12px;margin-bottom:10px}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-cancel{flex:1;background:transparent;border:1px solid rgba(255,255,255,.12);color:#94a3b8;border-radius:10px;padding:10px 0;font-size:14px;cursor:pointer}
.modal-ok{flex:1;background:#f97316;color:#fff;border:none;border-radius:10px;padding:10px 0;font-size:14px;font-weight:700;cursor:pointer}
.modal-hint{margin-top:14px;text-align:center;color:#334155;font-size:11px}

/* Confirm dialog */
.confirm-modal{padding:28px;width:100%;max-width:320px;border-radius:20px;background:#0f172a;border:1px solid rgba(239,68,68,.3)}
.confirm-modal h2{font-size:17px;font-weight:800;margin-bottom:8px}
.confirm-modal p{font-size:13px;color:#94a3b8;margin-bottom:0;line-height:1.6}
.confirm-btns{display:flex;gap:8px;margin-top:18px}
.confirm-cancel{flex:1;background:transparent;border:1px solid rgba(255,255,255,.12);color:#94a3b8;border-radius:10px;padding:10px 0;font-size:14px;cursor:pointer}
.confirm-ok{flex:1;background:#ef4444;color:#fff;border:none;border-radius:10px;padding:10px 0;font-size:14px;font-weight:700;cursor:pointer}

/* Tree view */
.tree-view{overflow:auto;padding:20px 16px 40px;min-height:80vh}
.tree-groups{display:flex;gap:40px;align-items:flex-start;min-width:max-content}
.tree-group{display:flex;flex-direction:column;align-items:center;gap:0}
.tree-group-label{font-size:12px;font-weight:800;color:#f97316;letter-spacing:.15em;text-transform:uppercase;margin-bottom:16px;text-align:center}
.tree-champion{display:flex;flex-direction:column;align-items:center;margin-bottom:8px}
.tree-champ-box{background:rgba(251,191,36,.15);border:2px solid #fbbf24;border-radius:12px;padding:10px 20px;text-align:center;min-width:160px}
.tree-champ-icon{font-size:20px;margin-bottom:2px}
.tree-champ-label{font-size:10px;color:#fbbf24;font-weight:800;letter-spacing:.1em}
.tree-champ-name{font-size:15px;color:#fbbf24;font-weight:900;margin-top:2px;min-height:20px}
.tree-connector-down{width:2px;height:16px;background:rgba(251,191,36,.4);margin:0 auto}
.tree-rounds{display:flex;flex-direction:column-reverse;gap:0}
.tree-round{display:flex;flex-direction:column;align-items:center;margin-bottom:0}
.tree-round-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin:8px 0 4px;text-align:center}
.tree-matches-row{display:flex;gap:12px;align-items:flex-end;justify-content:center}
.tree-match{display:flex;flex-direction:column;align-items:center;position:relative}
.tree-match-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 10px;min-width:150px;cursor:default}
.tree-match-card.done{border-color:rgba(249,115,22,.5);background:rgba(249,115,22,.06)}
.tree-team{font-size:12px;padding:2px 0;display:flex;justify-content:space-between;align-items:center;gap:6px}
.tree-team-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-team-name.winner{color:#f97316;font-weight:700}
.tree-team-name.empty{color:#334155;font-style:italic}
.tree-team-name.editable{border-bottom:1px dashed rgba(249,115,22,.4);cursor:pointer}
.tree-score{font-family:monospace;font-size:14px;font-weight:700;color:#94a3b8;flex-shrink:0}
.tree-score.winner{color:#f97316}
.tree-divider{border-top:1px solid rgba(255,255,255,.08);margin:3px 0}
.tree-edit-btn{width:100%;margin-top:5px;background:transparent;border:1px solid rgba(249,115,22,.2);border-radius:6px;color:#f97316;font-size:11px;padding:3px 0;cursor:pointer}
.tree-bye-btn{width:100%;margin-top:5px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.4);border-radius:6px;color:#4ade80;font-size:11px;padding:3px 0;cursor:pointer}
.tree-connector-up{width:2px;background:rgba(255,255,255,.15);margin:0 auto;flex-shrink:0}
.tree-connector-h{height:2px;background:rgba(255,255,255,.15);position:absolute;top:0}

.hidden{display:none!important}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid rgba(249,115,22,.4);color:#f8fafc;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;transition:opacity .4s}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="event-sub" id="headerSub">2024 · 籃球錦標賽</div>
        <div class="event-name" id="headerTitle">SLAM <span class="o">DUNK</span> CUP</div>
      </div>
      <div class="header-right">
        <div style="display:flex;gap:6px;align-items:center">
          <button class="lang-btn" onclick="toggleLang()">🌐 EN</button>
          <button class="admin-btn off" id="adminBtn" onclick="toggleAdmin()">🔐 工作人員</button>
        </div>
        <div class="live-dot">
          <div class="dot pulse"></div>
          <div class="live-label" id="liveLabel">即時更新</div>
        </div>
      </div>
    </div>
    <div class="tabs" id="tabBar">
      <button class="tab active" onclick="showTab('groups',this)" id="tabGroups">🏆 晉級圖</button>
      <button class="tab" onclick="showTab('tree',this)" id="tabTree">🌲 樹狀圖</button>
      <button class="tab" onclick="showTab('announce',this)" id="tabAnnounce">📢 公告</button>
    </div>
  </div>
</div>

<div class="content">

  <!-- Groups Tab -->
  <div id="tab-groups">
    <!-- Admin Panel -->
    <div class="admin-panel hidden" id="adminPanel">
      <div class="admin-panel-title" id="apTitle">⚙️ 管理員設定</div>

      <!-- Title edit -->
      <div class="admin-section">
        <div class="admin-section-label" id="apTitleLabel">主視覺標題</div>
        <div class="admin-row">
          <input class="admin-input" id="inputMainTitle" placeholder="副標題 (例：2024 籃球錦標賽)" style="flex:1;min-width:160px"/>
          <input class="admin-input" id="inputMainName" placeholder="主標題 (例：SLAM DUNK CUP)" style="flex:1;min-width:160px"/>
          <button class="admin-save-btn" onclick="saveTitle()" id="btnSaveTitle">儲存</button>
        </div>
      </div>

      <!-- Group names edit -->
      <div class="admin-section">
        <div class="admin-section-label" id="apGroupLabel">組別名稱</div>
        <div class="group-name-grid">
          <input class="admin-input" id="gname0" placeholder="第一組"/>
          <input class="admin-input" id="gname1" placeholder="第二組"/>
          <input class="admin-input" id="gname2" placeholder="第三組"/>
          <input class="admin-input" id="gname3" placeholder="第四組"/>
        </div>
        <div style="margin-top:8px">
          <button class="admin-save-btn" onclick="saveGroupNames()" id="btnSaveGroups">儲存組別名稱</button>
        </div>
      </div>

      <!-- Round management -->
      <div class="admin-section">
        <div class="admin-section-label" id="apRoundLabel">輪次管理（僅套用於目前選取的組別）</div>
        <div class="round-mgmt-row" id="roundMgmtRow"></div>
        <!-- Inline add round UI -->
        <div class="admin-row" style="flex-wrap:wrap;gap:8px;margin-top:8px">
          <input class="admin-input" id="newRoundName" placeholder="輸入輪次名稱（例：資格賽、十六強）" style="flex:1;min-width:180px"/>
          <button class="admin-save-btn" onclick="addRoundAtEnd()" id="btnAddRoundEnd">＋ 加在最後</button>
          <button class="admin-save-btn" onclick="addRoundAtStart()" id="btnAddRoundStart" style="background:rgba(255,255,255,.1)">＋ 加在最前面</button>
        </div>
      </div>

      <!-- Seed / Swap -->
      <div class="admin-section">
        <div class="admin-section-label" id="apSwapLabel">種子隊 / 輪空安排</div>
        <button class="swap-btn" id="btnSwapMode" onclick="toggleSwapMode()">🔀 開啟「點兩格互換位置」模式</button>
        <div class="swap-hint-bar hidden" id="swapHintBar"></div>
      </div>

      <!-- Clear all -->
      <div class="admin-section">
        <div class="admin-section-label" id="apDangerLabel">危險操作</div>
        <button class="danger-btn" onclick="confirmClearAll()" id="btnClearAll">🗑️ 清除所有晉級圖比分</button>
      </div>
    </div>

    <div class="group-tabs-row" id="groupTabsRow"></div>

    <div class="bracket-hint" id="bracketHint">← 左右滑動查看完整晉級圖</div>
    <div class="bracket-scroll">
      <div class="bracket-row" id="bracketRow"></div>
    </div>
  </div>

  <!-- Announce Tab -->
  <div id="tab-announce" class="hidden">
    <div id="annInputRow" class="ann-input-row hidden">
      <input class="ann-input" id="annInput" placeholder="輸入公告內容後按發布..."
        onkeydown="if(event.key==='Enter')postAnn()"/>
      <button class="ann-post-btn" onclick="postAnn()" id="btnPostAnn">發布</button>
    </div>
    <div id="annList"></div>
  </div>

  <!-- Tree Tab -->

async function fetchCloudState(){

      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }

async function pushCloudState(){
  const state = { allRounds, announcements, mainTitle, mainSub, groupNames, annIdCounter };

  lastSyncedJSON = json;

        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        Prefer: 'return=minimal'
      },
      body: JSON.stringify({ data: state })
    });
  }catch(e){ console.error('Cloud push failed', e); }
}

function applyCloudState(state){

// ── Bracket ──
function roundNameFor(matchCount, lang){
  const names = lang==='en'
    ? {1:'Final',2:'Semifinals',4:'Quarterfinals',8:'Round of 16',16:'Round of 32'}
    : {1:'決賽',2:'四強',4:'八強',8:'十六強',16:'三十二強'};
  return names[matchCount] || (matchCount*2 + (lang==='en' ? ' Teams' : '強'));
}

function buildBracket(teams){
  const r1=[];
  for(let i=0;i<8;i++) r1.push({id:`r1-${i}`,t1:teams[i*2]||null,t2:teams[i*2+1]||null,s1:null,s2:null,winner:null,status:'未開賽'});
  const r2=[],r3=[],rf=[];
  for(let i=0;i<4;i++) r2.push({id:`r2-${i}`,t1:null,t2:null,s1:null,s2:null,winner:null,status:'未開賽'});
  for(let i=0;i<2;i++) r3.push({id:`r3-${i}`,t1:null,t2:null,s1:null,s2:null,winner:null,status:'未開賽'});
  rf.push({id:'final',t1:null,t2:null,s1:null,s2:null,winner:null,status:'未開賽'});
  return [
    {name:roundNameFor(8,lang),matches:r1},
    {name:roundNameFor(4,lang),matches:r2},
    {name:roundNameFor(2,lang),matches:r3},
    {name:roundNameFor(1,lang),matches:rf},
  ];
}

function propagate(rounds){
  rounds.forEach(r => { if(!r.customName) r.name = roundNameFor(r.matches.length, lang); });
  for(let ri=0;ri<rounds.length-1;ri++){
    if(!rounds[ri].autoAdvance) continue;
    const winners=rounds[ri].matches.map(m=>m.winner);
    const nextCount=rounds[ri+1].matches.length;
    for(let mi=0;mi<nextCount;mi++){
      const target=rounds[ri+1].matches[mi];
      // Slot 1 (left): only fill if completely empty
      const newT1=winners[mi*2]||null;
      if(!target.t1 && newT1){ target.t1=newT1; }
      // Slot 2 (right): only fill if completely empty
      const newT2=winners[mi*2+1]||null;
      if(!target.t2 && newT2){ target.t2=newT2; }
    }
  }
}

function newMatch(){
  return {id:'m-'+Math.random().toString(36).slice(2,9), t1:null, t2:null, s1:null, s2:null, winner:null, status:'未開賽'};
}

function getRoundNameInput(defaultName){
  const el = document.getElementById('newRoundName');
  const val = el ? el.value.trim() : '';
  if(el) el.value = '';
  return val || defaultName;
}

// Add a new round at the very end
function addRoundAtEnd(){
  const rounds = allRounds[currentGroup];
  const lastCount = rounds[rounds.length-1].matches.length;
  const newCount = Math.max(1, Math.floor(lastCount/2));
  const defaultName = roundNameFor(newCount, lang);
  const name = getRoundNameInput(defaultName);
  const matches = Array.from({length:newCount}, ()=>newMatch());
  rounds.push({ name, customName: name !== defaultName, matches });
  renderRoundMgmt();
  renderBracket();
  pushCloudState();
}

// Add a new round at the very start (e.g. 資格賽)
function addRoundAtStart(){
  const rounds = allRounds[currentGroup];
  const firstCount = rounds[0].matches.length;
  const newCount = Math.max(1, Math.floor(firstCount/2));
  const defaultName = lang==='en' ? 'Qualifier' : '資格賽';
  const name = getRoundNameInput(defaultName);
  const matches = Array.from({length:newCount}, ()=>newMatch());
  rounds.unshift({ name, customName: true, matches });
  renderRoundMgmt();
  renderBracket();
  pushCloudState();
}

function removeRound(idx){
  const rounds = allRounds[currentGroup];
  if(rounds.length<=1){ showToast(lang==='en'?'Must keep at least 1 round':'至少要保留1輪'); return; }
  rounds.splice(idx,1);
  renderRoundMgmt();
  renderBracket();
  pushCloudState();
}

function renderRoundMgmt(){
  const row = document.getElementById('roundMgmtRow');
  if(!row) return;
  const rounds = allRounds[currentGroup];
  row.innerHTML = '';
  rounds.forEach((r, i)=>{
    const chip = document.createElement('div');
    chip.className = 'round-chip';
    chip.style.flexWrap = 'wrap';

    // Editable name span
    const nameSpan = document.createElement('span');
    nameSpan.textContent = `${r.name}（${r.matches.length}場）`;
    nameSpan.style.cssText = 'cursor:pointer;border-bottom:1px dashed rgba(249,115,22,.5);padding-bottom:1px';
    nameSpan.title = lang==='en' ? 'Click to rename' : '點擊可修改名稱';
    nameSpan.onclick = () => editRoundName(i, nameSpan, r);
    chip.appendChild(nameSpan);

    // Auto-advance toggle (only show if there's a next round)
    if(i < rounds.length - 1){
      const toggle = document.createElement('label');
      toggle.style.cssText = 'display:flex;align-items:center;gap:3px;cursor:pointer;font-size:10px;color:#94a3b8;margin-left:4px;user-select:none';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !!r.autoAdvance;
      cb.style.cssText = 'accent-color:#f97316;cursor:pointer;width:12px;height:12px';
      cb.onchange = () => {
        allRounds[currentGroup][i].autoAdvance = cb.checked;
        if(cb.checked){
          // Immediately propagate existing results into next round
          propagate(allRounds[currentGroup]);
          renderBracket();
        }
        pushCloudState();
      };
      toggle.appendChild(cb);
      toggle.appendChild(document.createTextNode(lang==='en'?'Auto':'自動晉級'));
      chip.appendChild(toggle);
    }

    if(rounds.length > 1){
      const delBtn = document.createElement('button');
      delBtn.textContent = '✕';
      delBtn.title = '刪除';
      delBtn.onclick = () => removeRound(i);
      chip.appendChild(delBtn);
    }
    row.appendChild(chip);
  });
}

function editRoundName(idx, el, r){
  const input = document.createElement('input');
  input.value = r.name;
  input.style.cssText = 'background:#1e293b;border:1px solid #f97316;border-radius:6px;padding:2px 8px;color:#f8fafc;font-size:12px;width:120px;outline:none';
  el.replaceWith(input);
  input.focus();
  input.select();
  function save(){
    const val = input.value.trim();
    if(val){
      allRounds[currentGroup][idx].name = val;
      allRounds[currentGroup][idx].customName = true;
    }
    renderRoundMgmt();
    renderBracket();
    pushCloudState();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter') input.blur();
    if(e.key==='Escape'){ input.value=r.name; input.blur(); }
  });
}

// ── Seed / Swap mode ──
let swapMode = false;
let swapSelected = null; // {ri, mi, slot}

function toggleSwapMode(){
  swapMode = !swapMode;
  swapSelected = null;
  const btn = document.getElementById('btnSwapMode');
  btn.className = swapMode ? 'swap-btn active' : 'swap-btn';
  btn.textContent = swapMode ? t('swapModeOff') : t('swapModeOn');
  const hint = document.getElementById('swapHintBar');
  if(swapMode){
    hint.textContent = t('swapHintText');
    hint.className = 'swap-hint-bar';
  } else {
    hint.className = 'swap-hint-bar hidden';
  }
  renderBracket();
}

function onSwapClick(ri, mi, slot){
  if(!swapSelected){
    swapSelected = {ri, mi, slot};
    renderBracket();
    return;
  }
  const rounds = allRounds[currentGroup];
  const a = rounds[swapSelected.ri].matches[swapSelected.mi];
  const b = rounds[ri].matches[mi];
  const aKey = swapSelected.slot===1 ? 't1' : 't2';
  const bKey = slot===1 ? 't1' : 't2';
  const tmp = a[aKey];
  a[aKey] = b[bKey];
  b[bKey] = tmp;
  swapSelected = null;
  // Recompute downstream propagation since team positions changed
  propagate(rounds);
  renderBracket();
  pushCloudState();
}

// ── Drag & Drop ──
let dragSrc = null; // {ri, mi}

function getDragData(ri, mi){ return JSON.stringify({ri, mi, g: currentGroup}); }

function onDragStart(e, ri, mi){
  dragSrc = {ri, mi};
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', getDragData(ri, mi));
  setTimeout(()=>{ e.target.classList.add('dragging'); }, 0);
}

function onDragEnd(e){
  document.querySelectorAll('.match-card').forEach(c=>c.classList.remove('drag-over','dragging'));
  dragSrc = null;
}

function onDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }

function onDragEnter(e, card){
  e.preventDefault();
  card.classList.add('drag-over');
}

function onDragLeave(e, card){
  // Only remove drag-over if we're leaving the card itself, not a child element inside it
  if(!card.contains(e.relatedTarget)){
    card.classList.remove('drag-over');
  }
}

function onDrop(e, ri, mi){
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.match-card').forEach(c=>c.classList.remove('drag-over'));
  if(!dragSrc) return;
  if(dragSrc.ri === ri && dragSrc.mi === mi) return;
  const rounds = allRounds[currentGroup];
  const src = rounds[dragSrc.ri].matches[dragSrc.mi];
  const dst = rounds[ri].matches[mi];
  // Deep swap all fields except id
  const srcId = src.id, dstId = dst.id;
  const tmp = {...src};
  Object.assign(src, dst);
  Object.assign(dst, tmp);
  src.id = srcId; dst.id = dstId; // keep ids stable
  propagate(rounds);
  renderBracket();
  pushCloudState();
}

// ── Name Drag ──
let nameDragSrc = null; // {ri, mi, slot}

function onNameDragStart(e, ri, mi, slot){
  nameDragSrc = {ri, mi, slot};
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', JSON.stringify({type:'name', ri, mi, slot}));
  e.stopPropagation(); // don't trigger card drag
}

function onNameDragOver(e){ e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = 'move'; }

function onNameDragEnter(e, span){ e.stopPropagation(); span.classList.add('name-drag-over'); }

function onNameDragLeave(e, span){ span.classList.remove('name-drag-over'); }

function onNameDrop(e, ri, mi, slot){
  e.preventDefault();
  e.stopPropagation();
  const span = e.currentTarget;
  span.classList.remove('name-drag-over');
  if(!nameDragSrc) return;
  const src = nameDragSrc;
  nameDragSrc = null;
  if(src.ri===ri && src.mi===mi && src.slot===slot) return;

  const rounds = allRounds[currentGroup];
  const srcMatch = rounds[src.ri].matches[src.mi];
  const dstMatch = rounds[ri].matches[mi];
  const srcKey = src.slot===1 ? 't1' : 't2';
  const dstKey = slot===1 ? 't1' : 't2';

  // Swap the names
  const srcName = srcMatch[srcKey];
  const dstName = dstMatch[dstKey];
  srcMatch[srcKey] = dstName;
  dstMatch[dstKey] = srcName;

  // Update winners if needed
  if(srcMatch.winner===srcName) srcMatch.winner=dstName;
  if(dstMatch.winner===dstName) dstMatch.winner=srcName;

  propagate(rounds);
  renderBracket();
  pushCloudState();
}

function renderBracket(){
  const rounds=allRounds[currentGroup];
  rounds.forEach(r => { if(!r.customName) r.name = roundNameFor(r.matches.length, lang); });
  renderRoundMgmt();
  const row=document.getElementById('bracketRow');
  row.innerHTML='';
  rounds.forEach((round,ri)=>{
    const col=document.createElement('div');
    col.className='round-col';
    const lbl=document.createElement('div');
    lbl.className='round-label';
    lbl.style.color=ROUND_COLORS[round.name]||'#94a3b8';
    lbl.textContent=round.name;
    col.appendChild(lbl);
    const md=document.createElement('div');
    md.className='round-matches';
    md.style.gap=(Math.pow(2,ri)*10)+'px';
    round.matches.forEach((m,mi)=>md.appendChild(makeMatchCard(m,ri,mi)));
    col.appendChild(md);
    if(isAdmin && !swapMode){
      const addBtn = document.createElement('button');
      addBtn.className = 'add-match-btn';
      addBtn.textContent = t('addMatch');
      addBtn.onclick = ()=>addMatchToRound(ri);
      col.appendChild(addBtn);
    }
    row.appendChild(col);
  });
  const lastRound = rounds[rounds.length-1];
  const champ = lastRound.matches.length===1 ? lastRound.matches[0].winner : null;
  if(champ){
    const box=document.createElement('div');
    box.className='champion-box';
    box.innerHTML=`<div class="champion-icon">🏆</div><div class="champion-label">${groupNames[currentGroup]} ${t('champion')}</div><div class="champion-name">${champ}</div>`;
    row.appendChild(box);
  }
}

function addMatchToRound(ri){
  const rounds = allRounds[currentGroup];
  rounds[ri].matches.push(newMatch());
  renderBracket();
  pushCloudState();
}

function removeMatch(ri, mi){
  const rounds = allRounds[currentGroup];
  const m = rounds[ri].matches[mi];
  const hasContent = m.t1 || m.t2;
  const msg = hasContent
    ? (lang==='en' ? 'This match has teams in it. Delete anyway?' : '這場比賽裡還有隊伍資料，確定要刪除嗎？')
    : (lang==='en' ? 'Delete this empty match slot?' : '確定要刪除這個空場次嗎？');
  if(!confirm(msg)) return;
  if(rounds[ri].matches.length <= 1){
    alert(lang==='en' ? 'A round must have at least 1 match. Use "remove round" instead.' : '每一輪至少要保留1場比賽，若要整輪刪除請用上方的輪次刪除功能。');
    return;
  }
  rounds[ri].matches.splice(mi, 1);
  renderBracket();
  pushCloudState();
}

function makeMatchCard(m,ri,mi){
  const isPlaceholder=!m.t1&&!m.t2;
  const isDone=!!m.winner;
  const isSwapSelected = swapMode && swapSelected && swapSelected.ri===ri && swapSelected.mi===mi;
  const div=document.createElement('div');
  let cardClass = 'match-card '+(isPlaceholder?'placeholder':isDone?'done':'pending');
  if(isSwapSelected) cardClass += ' swap-selected';
  if(swapMode) cardClass += ' swap-mode';
  div.className = cardClass;

  // Enable drag-and-drop for admin (not during swap mode)
  if(isAdmin && !swapMode){
    // We set draggable on the card but only start drag from the handle bar
    div.addEventListener('dragover', onDragOver);
    div.addEventListener('dragenter', e => onDragEnter(e, div));
    div.addEventListener('dragleave', e => onDragLeave(e, div));
    div.addEventListener('drop', e => onDrop(e, ri, mi));
  }

  let statusHTML='';
  if(!isPlaceholder && !swapMode){
    const sc = isDone ? '#f97316' : '#475569';
    const sl = isDone ? t('statusDone') : t('statusPending');
    statusHTML=`<div class="match-status"><div class="status-dot" style="background:${sc}"></div><span style="color:${sc}">${sl}</span></div>`;
  }

  const w1=m.winner && m.winner===m.t1, w2=m.winner && m.winner===m.t2;
  const editId=`edit-${currentGroup}-r${ri}m${mi}`;
  const canEditName = isAdmin && !swapMode;

  function teamRowAttrs(slot){
    if(swapMode && isAdmin){
      return `onclick="onSwapClick(${ri},${mi},${slot})" class="team-row swap-target"`;
    }
    if(canEditName){
      return `onclick="editTeamName(${ri},${mi},${slot},this)" class="team-row" style="cursor:pointer"`;
    }
    return `class="team-row"`;
  }

  div.innerHTML=`
    ${isAdmin && !swapMode ? `<div class="drag-handle-bar" title="${lang==='en'?'Drag to move':'拖曳移動'}"></div>` : ''}
    ${isAdmin && !swapMode ? `<button class="del-match-btn" onclick="removeMatch(${ri},${mi})" title="刪除這場">✕</button>` : ''}
    ${statusHTML}
    <div ${teamRowAttrs(1)}>
      <span class="team-name ${!m.t1?'placeholder-t':w1?'winner':''}" ${canEditName?'title="點擊修改隊名" style="border-bottom:1px dashed rgba(249,115,22,.5)"':''}>${m.t1 || (lang==='en'?'Empty':'空位')}</span>
    </div>
    <div class="score-row">
      <span class="score-label">${lang==='en'?'Score':'比分'}</span>
      <span class="team-score ${w1?'winner':''}">${m.s1!==null?m.s1:'–'}</span>
    </div>
    <div class="divider"></div>
    <div ${teamRowAttrs(2)}>
      <span class="team-name ${!m.t2?'placeholder-t':w2?'winner':''}" ${canEditName?'title="點擊修改隊名" style="border-bottom:1px dashed rgba(249,115,22,.5)"':''}>${m.t2 || (lang==='en'?'Empty':'空位')}</span>
    </div>
    <div class="score-row">
      <span class="score-label">${lang==='en'?'Score':'比分'}</span>
      <span class="team-score ${w2?'winner':''}">${m.s2!==null?m.s2:'–'}</span>
    </div>
    ${isAdmin && !swapMode ? renderMatchAdminControls(m, ri, mi, editId) : ''}
  `;

  // Wire drag handle (card-level drag)
  if(isAdmin && !swapMode){
    const handle = div.querySelector('.drag-handle-bar');
    if(handle){
      handle.addEventListener('mousedown', ()=>{ div.draggable = true; });
      handle.addEventListener('mouseup', ()=>{ div.draggable = false; });
    }
    div.addEventListener('dragstart', e => { if(div.draggable) onDragStart(e, ri, mi); else e.preventDefault(); });
    div.addEventListener('dragend', e => { onDragEnd(e); div.draggable = false; });

    // Wire name-level drag (individual team name spans)
    div.querySelectorAll('.team-name').forEach((span, idx)=>{
      const slot = idx===0 ? 1 : 2;
      span.draggable = true;
      span.addEventListener('dragstart', e => onNameDragStart(e, ri, mi, slot));
      span.addEventListener('dragover', e => onNameDragOver(e));
      span.addEventListener('dragenter', e => onNameDragEnter(e, span));
      span.addEventListener('dragleave', e => onNameDragLeave(e, span));
      span.addEventListener('drop', e => onNameDrop(e, ri, mi, slot));
      span.addEventListener('dragend', ()=>{ nameDragSrc=null; document.querySelectorAll('.name-drag-over').forEach(s=>s.classList.remove('name-drag-over')); });
    });
  }

  return div;
}

function renderMatchAdminControls(m, ri, mi, editId){
  const hasBothTeams = m.t1 && m.t2;
  const hasOneTeam = (m.t1 && !m.t2) || (!m.t1 && m.t2);
  if(hasOneTeam && !m.winner){
    return `<button class="bye-btn" onclick="confirmByeAdvance(${ri},${mi})">✓ ${t('byeAdvance')}</button>`;
  }
  if(hasBothTeams){
    const t1esc = m.t1.replace(/'/g,"\\'");
    const t2esc = m.t2.replace(/'/g,"\\'");
    return `
      <div id="${editId}">
        <button class="edit-btn" onclick="openEdit(${ri},${mi},'${t1esc}','${t2esc}','${editId}')">${t('editBtn')}</button>
      </div>
    `;
  }
  return '';
}

function confirmByeAdvance(ri, mi){
  const rounds = allRounds[currentGroup];
  const m = rounds[ri].matches[mi];
  const advancing = m.t1 || m.t2;
  if(!confirm((lang==='en'?'Confirm bye-advance for: ':'確認讓 ') + advancing + (lang==='en'?'?':' 輪空晉級？'))) return;
  m.winner = advancing;
  propagate(rounds);
  renderBracket();
  pushCloudState();
}

function editTeamName(ri,mi,teamNum,el){
  const currentName = el.textContent.trim();
  const placeholderText = currentName === '空位' || currentName === 'Empty' ? '' : currentName;
  const input = document.createElement('input');
  input.value = placeholderText;
  input.placeholder = lang==='en' ? 'Team name' : '隊伍名稱';
  input.style.cssText = 'background:#1e293b;border:1px solid #f97316;border-radius:6px;padding:2px 6px;color:#f8fafc;font-size:13px;width:100%;outline:none;';
  el.replaceWith(input);
  input.focus();
  input.select();
  function save(){
    const newName = input.value.trim() || null;
    const rounds = allRounds[currentGroup];
    const m = rounds[ri].matches[mi];
    const oldName = teamNum===1 ? m.t1 : m.t2;

    if(teamNum===1){
      if(m.winner===m.t1) m.winner=newName;
      m.t1=newName;
      m.manualT1 = !!newName;
    } else {
      if(m.winner===m.t2) m.winner=newName;
      m.t2=newName;
      m.manualT2 = !!newName;
    }

    // If the old name exists in any later round, update it to the new name
    if(oldName && oldName !== newName){
      for(let r=ri+1; r<rounds.length; r++){
        rounds[r].matches.forEach(nm=>{
          if(nm.t1===oldName) nm.t1=newName;
          if(nm.t2===oldName) nm.t2=newName;
          if(nm.winner===oldName) nm.winner=newName;
        });
      }
    }

    propagate(rounds);
    renderBracket();
    pushCloudState();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') input.blur(); if(e.key==='Escape'){ input.value=placeholderText; input.blur(); } });
}

function openEdit(ri,mi,t1,t2,editId){
  const area=document.getElementById(editId);
  area.innerHTML=`
    <div class="score-inputs">
      <input class="score-input" id="si1-r${ri}m${mi}" type="number" min="0" placeholder="${t1}"/>
      <span class="vs-label">vs</span>
      <input class="score-input" id="si2-r${ri}m${mi}" type="number" min="0" placeholder="${t2}"/>
      <button class="confirm-btn" onclick="saveScore(${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}')"> ${t('confirmScore')}</button>
      <button class="cancel-btn" onclick="renderBracket()">${t('cancelScore')}</button>
    </div>
  `;
}

function saveScore(ri,mi,t1,t2){
  const s1=parseInt(document.getElementById('si1-r'+ri+'m'+mi).value);
  const s2=parseInt(document.getElementById('si2-r'+ri+'m'+mi).value);
  if(isNaN(s1)||isNaN(s2)||s1<0||s2<0) return;
  const rounds = allRounds[currentGroup];
  const m = rounds[ri].matches[mi];
  const prevWinner = m.winner;
  m.s1=s1; m.s2=s2; m.winner=s1>s2?t1:s2>s1?t2:null;

  // If winner changed, clear the old winner from next round slot
  if(prevWinner && prevWinner !== m.winner && rounds[ri].autoAdvance){
    const nextRound = rounds[ri+1];
    if(nextRound){
      const nextMi = Math.floor(mi/2);
      const nextMatch = nextRound.matches[nextMi];
      if(nextMatch){
        if(nextMatch.t1 === prevWinner){ nextMatch.t1 = m.winner; }
        if(nextMatch.t2 === prevWinner){ nextMatch.t2 = m.winner; }
        // If next match hasn't been played yet, also clear its score/winner
        if(nextMatch.s1 === null) nextMatch.winner = null;
      }
    }
  }

  propagate(rounds);
  renderBracket();
  pushCloudState();
}

    // Group label

    glabel.textContent = groupNames[g];
    groupDiv.appendChild(glabel);

    // Champion box

    const champBox = document.createElement('div');

    champBox.innerHTML = `
      <div class="tree-champ-box">

      <div class="tree-connector-down"></div>
    `;

    // Rounds (bottom to top = rendered in reverse order)
    const roundsDiv = document.createElement('div');
    roundsDiv.className = 'tree-rounds';

    rounds.forEach((round, ri)=>{
      const roundDiv = document.createElement('div');
      roundDiv.className = 'tree-round';

      // Connector line going up (between rounds)
      if(ri < rounds.length-1){
        const conn = document.createElement('div');
        conn.className = 'tree-connector-down';
        conn.style.height = '20px';
        roundDiv.appendChild(conn);
      }

      // Round label
      const rlabel = document.createElement('div');
      rlabel.className = 'tree-round-label';
      const rc = {'十六強':'#60a5fa','八強':'#a78bfa','四強':'#f472b6','決賽':'#f97316',
        'Round of 16':'#60a5fa','Quarterfinals':'#a78bfa','Semifinals':'#f472b6','Final':'#f97316'};
      rlabel.style.color = rc[round.name]||'#94a3b8';

      });
      roundDiv.appendChild(matchesRow);
      roundsDiv.appendChild(roundDiv);
    });

    groupDiv.appendChild(roundsDiv);
    groupsRow.appendChild(groupDiv);
  }
  container.appendChild(groupsRow);
}

function makeTreeCard(m, g, ri, mi){

function editTreeName(span, g, ri, mi, teamNum){
  const old = span.textContent.trim();
  const val = old==='空位'||old==='Empty'?'':old;
  const input = document.createElement('input');
  input.value=val; input.placeholder=lang==='en'?'Team name':'隊伍名稱';
  input.style.cssText='background:#1e293b;border:1px solid #f97316;border-radius:6px;padding:2px 6px;color:#f8fafc;font-size:12px;width:130px;outline:none';
  span.replaceWith(input); input.focus(); input.select();
  function save(){
    const newName=input.value.trim()||null;
    const rounds=allRounds[g];
    const m=rounds[ri].matches[mi];
    const oldName=teamNum===1?m.t1:m.t2;
    if(teamNum===1){if(m.winner===m.t1)m.winner=newName;m.t1=newName;m.manualT1=!!newName;}
    else{if(m.winner===m.t2)m.winner=newName;m.t2=newName;m.manualT2=!!newName;}
    if(oldName&&oldName!==newName){
      for(let r=ri+1;r<rounds.length;r++){
        rounds[r].matches.forEach(nm=>{
          if(nm.t1===oldName)nm.t1=newName;
          if(nm.t2===oldName)nm.t2=newName;
          if(nm.winner===oldName)nm.winner=newName;
        });
      }
    }
    propagate(rounds);
    renderTree();
    if(!document.getElementById('tab-groups').classList.contains('hidden')) renderBracket();
    pushCloudState();
  }
  input.addEventListener('blur',save);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')input.blur();if(e.key==='Escape'){input.value=val;input.blur();}});
}

function openTreeEdit(g,ri,mi,t1,t2,container){
  container.innerHTML=`
    <div style="display:flex;gap:4px;align-items:center;margin-top:5px;flex-wrap:wrap">
      <input id="ts1-${g}-r${ri}m${mi}" type="number" min="0" placeholder="${t1}" style="width:46px;background:#1e293b;border:1px solid #f97316;border-radius:6px;padding:2px 4px;color:#f8fafc;font-size:12px;text-align:center;outline:none"/>
      <span style="color:#475569;font-size:11px">vs</span>
      <input id="ts2-${g}-r${ri}m${mi}" type="number" min="0" placeholder="${t2}" style="width:46px;background:#1e293b;border:1px solid #f97316;border-radius:6px;padding:2px 4px;color:#f8fafc;font-size:12px;text-align:center;outline:none"/>
      <button onclick="saveTreeScore(${g},${ri},${mi},'${t1.replace(/'/g,"\\'")}','${t2.replace(/'/g,"\\'")}','${`ts1-${g}-r${ri}m${mi}`}','${`ts2-${g}-r${ri}m${mi}`}')" style="background:#f97316;color:#fff;border:none;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer">${t('confirmScore')}</button>
    </div>
  `;
}

function saveTreeScore(g,ri,mi,t1,t2,id1,id2){
  const s1=parseInt(document.getElementById(id1).value);
  const s2=parseInt(document.getElementById(id2).value);
  if(isNaN(s1)||isNaN(s2)||s1<0||s2<0) return;
  const rounds=allRounds[g];
  const m=rounds[ri].matches[mi];
  const prevWinner=m.winner;
  m.s1=s1;m.s2=s2;m.winner=s1>s2?t1:s2>s1?t2:null;
  if(prevWinner&&prevWinner!==m.winner&&rounds[ri].autoAdvance){
    const nextRound=rounds[ri+1];
    if(nextRound){
      const nextMi=Math.floor(mi/2);
      const nextMatch=nextRound.matches[nextMi];
      if(nextMatch){
        if(nextMatch.t1===prevWinner)nextMatch.t1=m.winner;
        if(nextMatch.t2===prevWinner)nextMatch.t2=m.winner;
        if(nextMatch.s1===null)nextMatch.winner=null;
      }
    }
  }
  propagate(rounds);
  renderTree();
  if(!document.getElementById('tab-groups').classList.contains('hidden')) renderBracket();
  pushCloudState();
}

function treeByeAdvance(g,ri,mi){
  if(!confirm(lang==='en'?'Confirm bye-advance?':'確認輪空晉級？')) return;
  const rounds=allRounds[g];
  const m=rounds[ri].matches[mi];
  m.winner=m.t1||m.t2;
  propagate(rounds);
  renderTree();
  pushCloudState();
}

// ── Announcements ──
function renderAnnouncements(){
  document.getElementById('annInputRow').className=isAdmin?'ann-input-row':'ann-input-row hidden';
  const list=document.getElementById('annList');
  list.innerHTML='';
  if(!announcements.length){
    list.innerHTML=`<div style="text-align:center;color:#475569;padding:40px 0;font-size:14px">${t('noAnn')}</div>`;
    return;
  }
  announcements.forEach(a=>{
    const div=document.createElement('div');
    div.className='ann-card card fade-in';
    div.innerHTML=`<div class="ann-header-row"><div><div class="ann-time">${a.time}</div><div class="ann-text">${a.text}</div></div>${isAdmin?`<button class="del-btn" onclick="deleteAnn(${a.id})">✕</button>`:''}</div>`;
    list.appendChild(div);
  });
}

function postAnn(){
  const inp=document.getElementById('annInput');
  const txt=inp.value.trim();
  if(!txt) return;
  const now=new Date();
  const time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  announcements.unshift({id:++annIdCounter,time,text:txt});
  inp.value='';
  renderAnnouncements();
  pushCloudState();
}

function deleteAnn(id){
  announcements=announcements.filter(a=>a.id!==id);
  renderAnnouncements();
  pushCloudState();
}

// ── Toast ──
function showToast(msg){
  let el=document.getElementById('toastEl');
  if(!el){el=document.createElement('div');el.id='toastEl';el.className='toast';document.body.appendChild(el);}
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0',2000);
}

// ── Init ──
async function initApp(){
  applyLang();
  const cloud = await fetchCloudState();
  if(cloud && Object.keys(cloud).length){
    applyCloudState(cloud);
    lastSyncedJSON = JSON.stringify(cloud);
    document.getElementById('headerSub').textContent = mainSub;
    document.getElementById('headerTitle').innerHTML = mainTitle;
  } else {
    pushCloudState();
  }
  renderGroupTabs();
  renderBracket();
  renderAnnouncements();
  setInterval(syncFromCloud, 5000);
}
initApp();
</script>
